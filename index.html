<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Merriweather:wght@400;700&family=Quicksand:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>
    
    <main class="game-wrapper">
        <header class="game-header">
            <h1 class="title">
                <span class="x-mark">X</span>
                <span class="divider">/</span>
                <span class="o-mark">O</span>
            </h1>
            <p class="subtitle" id="subtitle" data-i18n="subtitle-pve">不可战胜的 AI 对手</p>
        </header>

        <div class="mode-switch" id="mode-switch">
            <button class="mode-btn active" data-mode="pve" data-i18n="mode-pve" aria-pressed="true">人机</button>
            <button class="mode-btn" data-mode="pvp" data-i18n="mode-pvp" aria-pressed="false">双人</button>
            <button class="mode-btn" data-mode="aivsai" data-i18n="mode-aivsai" aria-pressed="false">AI 对战</button>
            <button class="mode-btn" data-mode="connect4" data-i18n="mode-connect4" aria-pressed="false">四子棋</button>
            <button class="mode-btn" data-mode="gomoku" data-i18n="mode-gomoku" aria-pressed="false">五子棋</button>
            <button class="mode-btn" data-mode="custom" data-i18n="mode-custom" aria-pressed="false">自定义</button>
        </div>

        <div class="battle-switch" id="battle-switch">
            <button class="battle-btn active" data-battle="pve" data-i18n="mode-pve" aria-pressed="true">人机</button>
            <button class="battle-btn" data-battle="pvp" data-i18n="mode-pvp" aria-pressed="false">双人</button>
            <button class="battle-btn" data-battle="aivsai" data-i18n="mode-aivsai" aria-pressed="false">AI 对战</button>
        </div>

        <div class="scoreboard" id="scoreboard">
            <div class="score-card player-x">
                <span class="label" data-i18n="label-player-x">玩家 (X)</span>
                <span class="score" id="score-x">0</span>
            </div>
            <div class="score-card draws">
                <span class="label" data-i18n="label-draw">平局</span>
                <span class="score" id="score-draw">0</span>
            </div>
            <div class="score-card player-o">
                <span class="label" data-i18n="label-player-o">AI (O)</span>
                <span class="score" id="score-o">0</span>
            </div>
        </div>

        <div class="status-bar" aria-live="polite" aria-atomic="true">
            <span id="status-text" data-i18n="status-your-turn">你的回合</span>
        </div>

        <!-- Tic Tac Toe Board -->
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
            <svg class="win-line" id="win-line" viewBox="0 0 300 300" preserveAspectRatio="none">
                <line x1="0" y1="0" x2="0" y2="0" stroke-width="8" stroke-linecap="round" />
            </svg>
        </div>

        <!-- Connect Four Board -->
        <div class="connect4-board" id="connect4-board">
            <div class="c4-cells" id="c4-cells"></div>
            <svg class="c4-win-line" id="c4-win-line" viewBox="0 0 700 600" preserveAspectRatio="none">
                <line x1="0" y1="0" x2="0" y2="0" stroke-width="8" stroke-linecap="round" />
            </svg>
        </div>

        <!-- Gomoku Board -->
        <div class="gomoku-board" id="gomoku-board">
            <div class="gomoku-cells" id="gomoku-cells"></div>
            <svg class="gomoku-win-line" id="gomoku-win-line" viewBox="0 0 1500 1500" preserveAspectRatio="none">
                <line x1="0" y1="0" x2="0" y2="0" stroke-width="6" stroke-linecap="round" />
            </svg>
        </div>

        <div class="controls">
            <button class="btn btn-restart" id="restart-btn">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                <span data-i18n="btn-restart">再来一局</span>
            </button>
            <button class="btn btn-settings" id="settings-btn" data-i18n-aria="aria-settings" aria-label="Settings">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
            <button class="btn btn-changelog" id="changelog-btn" data-i18n-aria="aria-changelog" aria-label="Changelog">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
            </button>
        </div>
    </main>

    <!-- Result Modal -->
    <div class="modal" id="result-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-content">
            <div class="modal-icon" id="modal-icon"></div>
            <h2 id="modal-title" data-i18n="modal-game-over">游戏结束</h2>
            <p id="modal-message" data-i18n="modal-win">恭喜获胜！</p>
            <button class="btn btn-primary" id="modal-btn" data-i18n="btn-play-again">再来一局</button>
        </div>
    </div>

    <!-- Settings Drawer -->
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <aside class="settings-drawer" id="settings-drawer" role="dialog" aria-modal="true" data-i18n-aria="settings-title" aria-label="Settings">
        <div class="drawer-header">
            <h2 data-i18n="settings-title">设置</h2>
            <button class="drawer-close" id="drawer-close" data-i18n-aria="aria-close" aria-label="Close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="drawer-body">
            <!-- Language -->
            <div class="setting-group">
                <label class="setting-label" data-i18n="setting-language">语言</label>
                <div class="lang-grid" id="lang-grid"></div>
            </div>

            <!-- Theme Color -->
            <div class="setting-group">
                <label class="setting-label" data-i18n="setting-theme-color">主题色</label>
                <div class="color-picker" id="color-picker"></div>
                <div class="custom-color-row">
                    <label class="setting-label sub" data-i18n="setting-custom-color">自定义</label>
                    <input type="color" id="custom-color-input" value="#7b68ee">
                </div>
            </div>

            <!-- Contrast -->
            <div class="setting-group">
                <div class="slider-header">
                    <label class="setting-label" data-i18n="setting-contrast">对比度</label>
                    <span class="slider-value" id="contrast-value">100%</span>
                </div>
                <input type="range" class="range-slider" id="contrast-slider" min="80" max="130" value="100">
            </div>

            <!-- Font -->
            <div class="setting-group">
                <label class="setting-label" data-i18n="setting-font">字体</label>
                <div class="segmented" id="font-segmented">
                    <button class="seg-btn active" data-font="inter" data-i18n="font-inter">Inter</button>
                    <button class="seg-btn" data-font="serif" data-i18n="font-serif">Serif</button>
                    <button class="seg-btn" data-font="mono" data-i18n="font-mono">Mono</button>
                    <button class="seg-btn" data-font="rounded" data-i18n="font-rounded">Rounded</button>
                </div>
            </div>

            <!-- Dark/Light -->
            <div class="setting-group">
                <label class="setting-label" data-i18n="setting-theme">外观模式</label>
                <div class="segmented" id="theme-segmented">
                    <button class="seg-btn active" data-theme="dark" data-i18n="theme-dark">深色</button>
                    <button class="seg-btn" data-theme="light" data-i18n="theme-light">浅色</button>
                    <button class="seg-btn" data-theme="auto" data-i18n="theme-auto">自动</button>
                </div>
            </div>

            <!-- 3D Board -->
            <div class="setting-row">
                <span class="setting-label" data-i18n="setting-3d">3D 棋盘</span>
                <label class="switch">
                    <input type="checkbox" id="toggle-3d">
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Animations -->
            <div class="setting-row">
                <span class="setting-label" data-i18n="setting-animations">动画效果</span>
                <label class="switch">
                    <input type="checkbox" id="toggle-animations" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Animation Speed -->
            <div class="setting-group">
                <label class="setting-label" data-i18n="setting-anim-speed">动画速度</label>
                <div class="segmented" id="anim-speed-segmented">
                    <button class="seg-btn" data-speed="slow" data-i18n="speed-slow">慢</button>
                    <button class="seg-btn active" data-speed="normal" data-i18n="speed-normal">中</button>
                    <button class="seg-btn" data-speed="fast" data-i18n="speed-fast">快</button>
                </div>
            </div>

            <!-- Sound -->
            <div class="setting-row">
                <span class="setting-label" data-i18n="setting-sound">音效</span>
                <label class="switch">
                    <input type="checkbox" id="toggle-sound" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Sound Style -->
            <div class="setting-group">
                <label class="setting-label" data-i18n="setting-sound-style">音效风格</label>
                <div class="segmented" id="sound-style-segmented">
                    <button class="seg-btn active" data-sound="classic" data-i18n="sound-classic">经典</button>
                    <button class="seg-btn" data-sound="electronic" data-i18n="sound-electronic">电子</button>
                    <button class="seg-btn" data-sound="retro" data-i18n="sound-retro">复古</button>
                    <button class="seg-btn" data-sound="wood" data-i18n="sound-wood">木琴</button>
                    <button class="seg-btn" data-sound="bell" data-i18n="sound-bell">铃铛</button>
                    <button class="seg-btn" data-sound="space" data-i18n="sound-space">太空</button>
                    <button class="seg-btn" data-sound="drum" data-i18n="sound-drum">鼓点</button>
                    <button class="seg-btn" data-sound="piano" data-i18n="sound-piano">钢琴</button>
                </div>
            </div>

            <!-- Sound Customization -->
            <div class="sound-custom-panel" id="sound-custom-panel">
                <div class="setting-group">
                    <div class="slider-header">
                        <label class="setting-label sub" data-i18n="sound-pitch">音高</label>
                        <span class="slider-value" id="pitch-value">0</span>
                    </div>
                    <input type="range" class="range-slider" id="pitch-slider" min="-12" max="12" value="0" step="1">
                </div>
                <div class="setting-group">
                    <div class="slider-header">
                        <label class="setting-label sub" data-i18n="sound-duration">音长</label>
                        <span class="slider-value" id="duration-value">100%</span>
                    </div>
                    <input type="range" class="range-slider" id="duration-slider" min="50" max="200" value="100">
                </div>
                <div class="setting-group">
                    <div class="slider-header">
                        <label class="setting-label sub" data-i18n="sound-volume">音量</label>
                        <span class="slider-value" id="volume-value">80%</span>
                    </div>
                    <input type="range" class="range-slider" id="volume-slider" min="0" max="100" value="80">
                </div>
                <button class="btn btn-test-sound" id="test-sound-btn" data-i18n="sound-test">试听</button>
            </div>

            <!-- Custom Game Settings -->
            <div class="setting-group" id="custom-game-group">
                <label class="setting-label" data-i18n="setting-custom-game">自定义游戏</label>
                <div class="custom-game-row">
                    <label class="setting-label sub" data-i18n="custom-board-size">棋盘大小</label>
                    <div class="segmented" id="board-size-segmented">
                        <button class="seg-btn" data-size="3">3×3</button>
                        <button class="seg-btn" data-size="5">5×5</button>
                        <button class="seg-btn" data-size="7">7×7</button>
                        <button class="seg-btn" data-size="10">10×10</button>
                        <button class="seg-btn" data-size="15">15×15</button>
                        <button class="seg-btn active" data-size="custom" data-i18n="custom-size">自定</button>
                    </div>
                </div>
                <div class="custom-game-row">
                    <label class="setting-label sub" data-i18n="custom-win-len">连珠数</label>
                    <input type="number" class="custom-input" id="custom-win-len" min="3" max="20" value="5">
                </div>
                <div class="custom-game-row">
                    <label class="setting-label sub" data-i18n="custom-board-w">棋盘宽</label>
                    <input type="number" class="custom-input" id="custom-board-w" min="3" max="20" value="15">
                </div>
                <div class="custom-game-row">
                    <label class="setting-label sub" data-i18n="custom-board-h">棋盘高</label>
                    <input type="number" class="custom-input" id="custom-board-h" min="3" max="20" value="15">
                </div>
            </div>

            <!-- AI Difficulty -->
            <div class="setting-group" id="ai-difficulty-group">
                <label class="setting-label" data-i18n="setting-difficulty">AI 难度</label>
                <div class="segmented" id="difficulty-segmented">
                    <button class="seg-btn" data-diff="easy" data-i18n="diff-easy">简单</button>
                    <button class="seg-btn" data-diff="medium" data-i18n="diff-medium">中等</button>
                    <button class="seg-btn active" data-diff="hard" data-i18n="diff-hard">困难</button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Changelog Modal -->
    <div class="modal" id="changelog-modal" role="dialog" aria-modal="true" aria-labelledby="changelog-title">
        <div class="modal-content changelog-content">
            <div class="changelog-header">
                <h2 id="changelog-title" data-i18n="changelog-title">更新公告</h2>
                <button class="drawer-close" id="changelog-close" data-i18n-aria="aria-close" aria-label="Close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="changelog-body" id="changelog-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
